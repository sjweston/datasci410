project:
  type: website
  render:
    - "*.qmd"
    - "!slides/"
  resources:
    - "files/"
    - "slides/*.html"
    - "slides/*.pdf"
    - "slides/*.js"
    - "slides/*.css"
    - "slides/img/"
    - "slides/libs/"
    - "slides/css/"
    - "slides/*_files/"

execute:
  freeze: auto

bibliography: files/bib/references.bib
csl: files/bib/apa.csl
description-meta: "An introduction to data science tools and techniques for psychology majors, covering data visualization, transformation, tidying, and communication using R and the tidyverse."

website:
  title: "PSY 410/510: Data Science for Psychology"
  site-url: https://sarajweston.com/datasci410/

  favicon: "/files/icon-512.png"

  twitter-card:
    image: "/files/social-image.png"
    card-style: summary_large_image
    creator: ""

  open-graph:
    image: "/files/social-image.png"
    locale: en_US

  navbar:
    pinned: true
    background: primary
    right:
      - text: "Syllabus"
        file: syllabus.qmd
      - text: "Schedule"
        file: schedule.qmd
      - text: "Content"
        file: content/index.qmd
      - text: "Assignments"
        file: assignment/index.qmd
      - text: "Project"
        file: project/index.qmd
      - text: "Resources"
        file: resource/index.qmd

  sidebar:
    - title: "Content"
      style: "docked"
      search: false
      background: dark
      contents:
        - section: "Overview"
          contents:
            - content/index.qmd
        - section: "Course content"
          contents:
            - text: "1: Introduction & Setup"
              file: content/01-content.qmd
            - text: "2: Your First Visualization"
              file: content/02-content.qmd
            - text: "3: Data Transformation I"
              file: content/03-content.qmd
            - text: "4: Data Transformation II"
              file: content/04-content.qmd
            - text: "5: Data Tidying"
              file: content/05-content.qmd
            - text: "6: Data Import"
              file: content/06-content.qmd
            - text: "7: Quarto & Reproducibility"
              file: content/07-content.qmd
            - text: "8: Layers & Aesthetics"
              file: content/08-content.qmd
            - text: "9: Perception & Design"
              file: content/09-content.qmd
            - text: "10: EDA — Variation"
              file: content/10-content.qmd
            - text: "11: EDA — Covariation"
              file: content/11-content.qmd
            - text: "12: Data Types Grab Bag"
              file: content/12-content.qmd
            - text: "13: Strings, Factors & Text"
              file: content/13-content.qmd
            - text: "14: Joins"
              file: content/14-content.qmd
            - text: "15: Missing Data"
              file: content/15-content.qmd
            - text: "16: Storytelling with Data"
              file: content/16-content.qmd
            - text: "17: Correlation & Simple Regression"
              file: content/17-content.qmd
            - text: "18: Putting It All Together"
              file: content/18-content.qmd

    - title: "Assignments"
      contents:
        - section: "Overview"
          contents:
            - assignment/index.qmd
        - section: "Weekly Assignments"
          contents:
            - text: "1: Getting Started"
              file: assignment/01-assignment.qmd
            - text: "2: Data Transformation"
              file: assignment/02-assignment.qmd
            - text: "3: Tidying & Import"
              file: assignment/03-assignment.qmd
            - text: "4: Visualization Deep Dive"
              file: assignment/04-assignment.qmd
            - text: "5: Exploratory Data Analysis"
              file: assignment/05-assignment.qmd
            - text: "6: Data Types"
              file: assignment/06-assignment.qmd
            - text: "7: Joins & Missing Data"
              file: assignment/07-assignment.qmd
            - text: "8: Reproducible Report"
              file: assignment/08-assignment.qmd

    - title: "Final Project"
      contents:
        - section: "Overview"
          contents:
            - project/index.qmd
        - section: "Milestones"
          contents:
            - text: "1: Proposal"
              file: project/01-proposal.qmd
            - text: "2: Draft Analysis"
              file: project/02-draft.qmd
            - text: "3: Final Report"
              file: project/03-final-report.qmd
            - text: "4: Presentation"
              file: project/04-presentation.qmd

    - title: "Resources"
      contents:
        - section: "Overview"
          contents:
            - resource/index.qmd
        - section: "Guides"
          contents:
            - text: "Installing R & RStudio"
              file: resource/installation.qmd
            - text: "Setting Up an R Project"
              file: resource/r-projects.qmd
            - text: "Using R Scripts"
              file: resource/r-scripts.qmd
            - text: "Using Quarto Documents"
              file: resource/quarto-docs.qmd
            - text: "Common R Errors"
              file: resource/common-errors.qmd
        - section: "Cheatsheets"
          contents:
            - text: "ggplot2"
              href: https://rstudio.github.io/cheatsheets/data-visualization.pdf
            - text: "dplyr"
              href: https://rstudio.github.io/cheatsheets/data-transformation.pdf
            - text: "tidyr"
              href: https://rstudio.github.io/cheatsheets/tidyr.pdf
            - text: "Quarto"
              href: https://rstudio.github.io/cheatsheets/quarto.pdf
            - text: "RStudio IDE"
              href: https://rstudio.github.io/cheatsheets/rstudio-ide.pdf
        - section: "External Resources"
          contents:
            - text: "R for Data Science (textbook)"
              href: https://r4ds.hadley.nz/
            - text: "Posit Primers"
              href: https://posit.cloud/learn/primers
            - text: "Cédric Scherer's ggplot2 Tutorial"
              href: https://www.cedricscherer.com/2019/08/05/a-ggplot2-tutorial-for-beautiful-plotting-in-r/
            - text: "Quarto Getting Started"
              href: https://quarto.org/docs/get-started/hello/rstudio.html

  page-footer:
    left: |
      Content {{< fa brands creative-commons >}} {{< var course.copyright_year >}} by [{{< var instructor.name_no_title >}}]({{< var instructor.url >}}) <br>
      All content licensed under a {{< fa brands creative-commons >}}
      {{< fa brands creative-commons-by >}} {{< fa brands creative-commons-nc >}}
      [Creative Commons Attribution-NonCommercial 4.0 International license (CC BY-NC 4.0)](https://creativecommons.org/licenses/by-nc/4.0/)
    right: |
      Made with {{< fa brands r-project >}} and [Quarto](https://quarto.org/)

format:
  html:
    lang: en
    theme:
      - litera
      - html/custom.scss
    toc: true
    highlight-style: monokai
